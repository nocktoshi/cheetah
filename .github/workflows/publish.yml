name: Publish to crates.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  check-version:
    name: Check Cargo.toml version
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      version: ${{ steps.detect.outputs.current }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect version change
        id: detect
        run: |
          set -euo pipefail

          current=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "current=${current}" >> "${GITHUB_OUTPUT}"

          if git rev-parse "refs/tags/v${current}" >/dev/null 2>&1; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::v${current} is already tagged — skipping release"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [ "${before}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          previous=$(git show "${before}:Cargo.toml" | grep '^version = ' | head -1 | cut -d'"' -f2)
          if [ "${current}" != "${previous}" ]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "Version changed: ${previous} -> ${current}"
          else
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "Version unchanged at ${current}"
          fi

  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy -- -Dwarnings

      - name: Run tests
        run: cargo test --locked

      - name: Build release
        run: cargo build --release

  release:
    name: Publish cheetah-curve
    needs: [check-version, ci]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@1.96

      - name: Generate release notes
        id: release_notes
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail

          tag="v${VERSION}"
          prev_tag=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)

          if [ -n "${prev_tag}" ]; then
            range="${prev_tag}..HEAD"
            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${prev_tag}...${GITHUB_SHA}"
            header="Changes since [${prev_tag}](${compare_url}):"
          else
            range="HEAD"
            header="Initial release."
          fi

          commits=$(git log "${range}" --pretty=format:"%s|%h" --no-merges || true)

          append_section() {
            local heading="$1"
            local pattern="$2"
            local matches

            matches=$(printf '%s\n' "${commits}" | grep -E "${pattern}" || true)
            if [ -n "${matches}" ]; then
              printf '\n### %s\n' "${heading}"
              printf '%s\n' "${matches}" | while IFS='|' read -r subject hash; do
                summary=$(printf '%s' "${subject}" | sed -E 's/^(feat|fix|chore|docs|perf|refactor|security|test|ci)(\([^)]+\))?: ?//')
                printf -- '- %s (%s)\n' "${summary}" "${hash}"
              done
            fi
          }

          {
            printf '## cheetah-curve %s\n\n' "${VERSION}"
            printf 'Published to [crates.io](https://crates.io/crates/cheetah-curve/%s).\n\n' "${VERSION}"
            printf '%s\n' "${header}"
            append_section "Features" '^feat(\(|:)'
            append_section "Fixes" '^fix(\(|:)'
            append_section "Performance" '^perf(\(|:)'
            append_section "Security" '^security(\(|:)'
            append_section "Refactoring" '^refactor(\(|:)'
            append_section "Documentation" '^docs(\(|:)'
            append_section "Maintenance" '^chore(\(|:)'

            other=$(printf '%s\n' "${commits}" | grep -Ev '^(feat|fix|chore|docs|perf|refactor|security|test|ci)(\(|\:)' || true)
            if [ -n "${other}" ]; then
              printf '\n### Other\n'
              printf '%s\n' "${other}" | while IFS='|' read -r subject hash; do
                printf -- '- %s (%s)\n' "${subject}" "${hash}"
              done
            fi
          } > "${RUNNER_TEMP}/release_body.md"

          {
            echo 'body<<EOF'
            cat "${RUNNER_TEMP}/release_body.md"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Auth to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: cheetah-curve v${{ needs.check-version.outputs.version }}
          target_commitish: ${{ github.sha }}
          body: ${{ steps.release_notes.outputs.body }}